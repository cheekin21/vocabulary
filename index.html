<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSLE Vocabulary Trainer</title>
    <style>
        :root {
            --bg-main: #0c0e12;
            --card-bg: #161a22;
            --text-white: #ffffff;
            --text-dim: #b3b9c4;
            --accent-blue: #388bfd;
            --accent-green: #238636;
            --accent-red: #da3633;
            --border-default: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-default);
            padding-bottom: 15px;
        }

        .session-info {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }

        .score-badge {
            font-size: 16px;
            font-weight: 700;
            background: #1f242c;
            border: 1px solid var(--border-default);
            padding: 8px 18px;
            border-radius: 6px;
            color: var(--accent-blue);
        }

        .word-title {
            font-size: 48px;
            font-weight: 700;
            color: var(--accent-blue);
            margin: 20px 0 15px 0;
        }

        .context-sentence {
            font-size: 20px;
            font-style: italic;
            color: var(--text-white);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .option-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            padding: 25px 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 100px;
            transition: border-color 0.15s ease, background-color 0.15s ease;
        }

        .option-card:hover:not(.disabled) {
            border-color: #8b949e;
        }

        .option-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .option-main-text {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-white);
        }

        .inner-definition {
            font-size: 14px;
            color: var(--text-dim);
            margin-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
            width: 100%;
            display: none;
            line-height: 1.4;
        }

        .option-card.correct {
            background-color: rgba(35, 134, 54, 0.15) !important;
            border-color: var(--accent-green) !important;
        }
        .option-card.correct .option-main-text {
            color: #56d364;
        }

        .option-card.incorrect {
            background-color: rgba(218, 54, 51, 0.15) !important;
            border-color: var(--accent-red) !important;
            cursor: not-allowed;
        }
        .option-card.incorrect .option-main-text {
            color: #ff7b72;
        }
        .option-card.incorrect .inner-definition {
            color: #ff7b72;
            border-top-color: rgba(218, 54, 51, 0.2);
        }

        .option-card.disabled {
            pointer-events: none;
        }

        .action-btn {
            background-color: var(--accent-blue);
            color: var(--text-white);
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            display: none;
            margin-left: auto;
        }

        .action-btn:hover {
            background-color: #58a6ff;
        }

        .screen {
            text-align: center;
            padding: 60px 20px;
        }

        .screen h2 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .screen p {
            color: var(--text-dim);
            font-size: 16px;
            margin-bottom: 30px;
        }

        .large-btn {
            background-color: var(--accent-blue);
            color: var(--text-white);
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
        }

        .score-display-big {
            font-size: 64px;
            font-weight: 700;
            color: var(--accent-blue);
            margin: 30px 0;
        }

        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="screen">
        <h2>PSLE Daily Vocabulary</h2>
        <p>20 random unseen words. 1.0 pt on Try 1 • 0.5 pt on Try 2 • 0 pt thereafter.</p>
        <button class="large-btn" id="start-btn">Begin Session</button>
    </div>

    <div id="quiz-window" style="display: none;">
        <div class="header-panel">
            <div class="session-info" id="q-progress">Question 1 of 20</div>
            <div class="score-badge" id="score-tracker">Score: 0.0</div>
        </div>

        <h1 class="word-title" id="display-word">---</h1>
        <div class="context-sentence" id="display-context">"---"</div>

        <div class="options-grid" id="grid-container"></div>

        <button class="action-btn" id="next-btn">Next Question →</button>
    </div>

    <div id="result-screen" class="screen" style="display: none;">
        <h2>Session Completed</h2>
        <div class="score-display-big" id="final-points">0.0 / 20</div>
        <p id="performance-commentary">Keep practicing to expand your Paper 2 capabilities.</p>
        <button class="large-btn" id="return-btn">Practice Again</button>
    </div>
</div>

function fetchStoredHistory() {
    try {
        const archived = localStorage.getItem(STORAGE_LOG_NAME);
        if (!archived) return [];
        const records = JSON.parse(archived);
        const chronologicalLimit = Date.now() - (3 * 24 * 60 * 60 * 1000); 
        return records.filter(entry => entry.timeToken >= chronologicalLimit);
    } catch (err) {
        return [];
    }
}

        localStorage.setItem(STORAGE_LOG_NAME, JSON.stringify(history));
    } catch (err) {
        console.warn(err);
    }
}

function compileDailySelection() {
    const activeHistory = fetchStoredHistory();
    const lockedWords = activeHistory.map(h => h.word);

    let accessiblePool = vocabLibrary.filter(item => !lockedWords.includes(item.word));
    if (accessiblePool.length < RUN_LIMIT) {
        accessiblePool = [...vocabLibrary];
    }

    for (let i = accessiblePool.length - 1; i > 0; i--) {
        const k = Math.floor(Math.random() * (i + 1));
        [accessiblePool[i], accessiblePool[k]] = [accessiblePool[k], accessiblePool[i]];
    }

    const outputSelection = accessiblePool.slice(0, RUN_LIMIT);
    archiveUsedWords(outputSelection.map(item => item.word));
    return outputSelection;
}

function launchEvaluation() {
    activeWords = compileDailySelection();
    currentIndex = 0;
    pointsAccumulated = 0.0;
    
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-window').style.display = 'block';
    
    renderTargetWord(currentIndex);
}

function renderTargetWord(idx) {
    currentWordAttempts = 0;
    document.getElementById('next-btn').style.display = 'none';
    
    document.getElementById('score-tracker').textContent = `Score: ${pointsAccumulated.toFixed(1)}`;
    document.getElementById('q-progress').textContent = `Question ${idx + 1} of ${RUN_LIMIT}`;
    
    const meta = activeWords[idx];
    document.getElementById('display-word').textContent = meta.word;
    document.getElementById('display-context').textContent = `"${meta.context}"`;

    const labels = ["A", "B", "C", "D"];
    const grid = document.getElementById('grid-container');
    grid.innerHTML = '';

    meta.options.forEach((optText, index) => {
        const card = document.createElement('div');
        card.className = 'option-card';
        card.dataset.index = index;

        const label = document.createElement('div');
        label.className = 'option-label';
        label.textContent = labels[index];
        card.appendChild(label);

        const mainText = document.createElement('div');
        mainText.className = 'option-main-text';
        mainText.textContent = optText;
        card.appendChild(mainText);

        const internalDef = document.createElement('div');
        internalDef.className = 'inner-definition';
        internalDef.textContent = meta.meanings[index];
        card.appendChild(internalDef);

        card.addEventListener('click', () => verifySelection(card, index, meta.correctIdx));
        grid.appendChild(card);
    });
}

function verifySelection(targetCard, clickedIdx, correctIdx) {
    if (targetCard.classList.contains('disabled') || targetCard.classList.contains('correct') || targetCard.classList.contains('incorrect')) {
        return;
    }

    currentWordAttempts++;

    if (clickedIdx === correctIdx) {
        targetCard.classList.add('correct');
        
        if (currentWordAttempts === 1) {
            pointsAccumulated += 1.0;
        } else if (currentWordAttempts === 2) {
            pointsAccumulated += 0.5;
        }

        document.getElementById('score-tracker').textContent = `Score: ${pointsAccumulated.toFixed(1)}`;

        const cards = document.querySelectorAll('.option-card');
        cards.forEach(c => {
            c.classList.add('disabled');
            const targetDef = c.querySelector('.inner-definition');
            targetDef.style.display = 'block';
        });

        document.getElementById('next-btn').style.display = 'block';
    } else {
        targetCard.classList.add('incorrect');
        targetCard.classList.add('disabled');
        
        const targetDef = targetCard.querySelector('.inner-definition');
        targetDef.style.display = 'block';
    }
}

function stepNextQuestion() {
    currentIndex++;
    if (currentIndex < RUN_LIMIT) {
        renderTargetWord(currentIndex);
    } else {
        concludeSession();
    }
}

function concludeSession() {
    document.getElementById('quiz-window').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('final-points').textContent = `${pointsAccumulated.toFixed(1)} / ${RUN_LIMIT}`;
}

function backToHome() {
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('start-screen').style.display = 'block';
}
</script>
